# os_agent daemon configuration

model:
  path: "finetuning/q4_k_m-deploy/qwen3.5-4b-os-q4km.gguf"
  n_ctx: 2048           # doubled from 1024 — headroom for session memory injection
  n_gpu_layers: -1      # all layers on GPU

generation:
  temperature: 0.3      # down from 0.5 — more deterministic output, same accuracy (confirmed by sweep)
  top_p: 0.98           # up from 0.95 — slightly wider nucleus for conceptual answers
  top_k: 15             # tighter sampling for command accuracy
  repeat_penalty: 1.1   # penalise repeated tokens — prevents duplicate flags (useradd -m -m, find -name -name)
  max_tokens: 1024
  stop_tokens:
    - "<|im_end|>"
    - "<|endoftext|>"

shell:
  name: "neurosh"
  default_mode: "terminal"    # "terminal" or "chatbot"
  chatbot_prefix: "?"         # prefix to trigger chatbot from terminal mode
  terminal_prefix: "!"        # prefix to force terminal from chatbot mode

memory:
  state_dir: "~/.local/share/ai-daemon"
  faiss_dims: 384  # all-MiniLM-L6-v2 embedding size
  max_vectors_per_domain: 500
  max_solution_age_days: 30  # solutions older than this are pruned on load and store

notify:
  enabled: true
  vram_threshold_mb: 500       # warn when free VRAM drops below this (MB)
  notify_on_moderate: false    # only notify on dangerous commands by default

sandbox:
  enabled: true
  timeout_seconds: 30

agents:
  domains:
    - files
    - network
    - process
    - packages
    - kernel
