# models.yaml — Model registry for the AI OS daemon (development).
# Production version is at os_build/config/includes.chroot/opt/ai-daemon/config/models.yaml

models:
  default: "qwen3.5-4b-os-q4km"

  local:
    - name: "qwen3.5-4b-os-q4km"
      path: "finetuning/q4_k_m-deploy/qwen3.5-4b-os-q4km.gguf"
      type: "gguf"
      description: "Default OS agent model (Qwen 3.5 4B, Q4_K_M quantization)"
    # Users add their own models here:
    # - name: "deepseek-7b"
    #   path: "/path/to/deepseek-7b-q4km.gguf"
    #   type: "gguf"
    #   description: "DeepSeek 7B for longer context tasks"

  # OpenRouter cloud inference (optional, user-configured).
  # API keys are stored in KWallet, not in this file.
  # The user's last-used model is remembered per-profile in KWallet.
  openrouter:
    enabled: false
