# QLoRA fine-tuning config for Qwen3.5-4B
# Both train_trl.py and train_qlora.py read this file.
# CLI args override any value here.

model:
  name: "Qwen/Qwen3.5-4B"
  max_seq_length: 1024   # reduced from 2048 — cuts logits memory 4x, most OS examples are short
  dtype: null  # auto-detect (bf16 on Ampere+, fp16 otherwise)

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true
  bnb_4bit_compute_dtype: "bfloat16"

training:
  num_epochs: 3
  per_device_train_batch_size: 16  # 31 GB per GPU, 4-bit model ~2.5 GB — plenty of room
  gradient_accumulation_steps: 2   # effective batch = 16 × 2 GPUs × 2 = 64
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  optimizer: "paged_adamw_8bit"
  gradient_checkpointing: true
  bf16: true
  fp16: false
  logging_steps: 5
  logging_first_step: true
  save_steps: 200
  save_total_limit: 3
  eval_strategy: "steps"
  eval_steps: 200
  seed: 42
  report_to: "wandb"  # "wandb" to enable W&B logging
  run_name: "qwen3.5-4b-os-qlora-v3-23k-synthetic"  # W&B run name (v3: 23k synthetic + multi-GPU)

data:
  train_file: "data/output/train.jsonl"
  val_file: "data/output/val.jsonl"

output:
  dir: "output/qlora-run"
  gguf_dir: "output/gguf"
  gguf_quant: "q5_k_m"

hub:
  push_to_hub: false  # set true + repo_id to upload adapter after training
  repo_id: null       # e.g. "SomeshRao007/qwen3.5-4b-os-qlora"
  private: true

resume_from_checkpoint: null
