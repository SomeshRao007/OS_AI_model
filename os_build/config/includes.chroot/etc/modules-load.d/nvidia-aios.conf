# nvidia-aios.conf — Request NVIDIA kernel modules at boot.
#
# These modules are loaded by systemd-modules-load.service early in boot.
# If no NVIDIA GPU is present, the kernel silently skips them (no error).
#
# nvidia        — core GPU driver
# nvidia_modeset — display modesetting support
# nvidia_drm     — DRM/KMS interface (required for Wayland)
# nvidia_uvm     — unified virtual memory (required for CUDA)

nvidia
nvidia_modeset
nvidia_drm
nvidia_uvm
