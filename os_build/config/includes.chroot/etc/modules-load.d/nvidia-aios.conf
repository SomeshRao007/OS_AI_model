# nvidia-aios.conf — Request NVIDIA kernel modules at boot.
#
# These modules are loaded by systemd-modules-load.service early in boot.
# If no NVIDIA GPU is present, the kernel silently skips them (no error).
#
# Debian's nvidia-kernel-dkms package registers modules as "nvidia-current"
# (not "nvidia"). However, Debian's nvidia-driver package also installs
# modprobe aliases that map "nvidia" → "nvidia-current". The hook
# 0100-nvidia-setup will log which naming convention the build used.
#
# We list both names — modprobe ignores names that don't resolve to a module.
#
# nvidia-current          — core GPU driver (Debian naming)
# nvidia-current-modeset  — display modesetting support
# nvidia-current-drm      — DRM/KMS interface (required for Wayland)
# nvidia-current-uvm      — unified virtual memory (required for CUDA)

nvidia-current
nvidia-current-modeset
nvidia-current-drm
nvidia-current-uvm

# Fallback names (in case a future driver version uses plain "nvidia")
nvidia
nvidia_modeset
nvidia_drm
nvidia_uvm
