# autologin.conf — Auto-login for the AI OS live session.
#
# Logs in as "user" (the account live-config creates) directly into the
# Plasma Wayland session. No password prompt on boot.
#
# Relogin=false prevents login loops if the session crashes — drops to
# the SDDM login screen instead, where the user can pick X11 fallback.

[Autologin]
User=user
Session=plasma
Relogin=false
