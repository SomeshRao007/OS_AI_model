# nvidia-aios.conf — NVIDIA driver configuration for AI OS.
#
# Blacklist nouveau (open-source NVIDIA driver) to prevent conflict with the
# proprietary nvidia driver. Without this, nouveau may grab the GPU first and
# the nvidia driver fails to load.
#
# Enable DRM kernel modesetting for nvidia-drm, required for:
#   - Wayland compositors (KDE Plasma 6 Wayland session)
#   - Proper VT switching
#   - Hardware cursor support
#
# fbdev=1 enables the nvidia framebuffer device, needed for console display
# when nvidia-drm is handling modesetting instead of the default fbdev drivers.

# ── Blacklist nouveau ────────────────────────────────────────────────────────
blacklist nouveau
blacklist lbm-nouveau

# Prevent nouveau from loading even if something tries to modprobe it directly
options nouveau modeset=0

# ── NVIDIA DRM modesetting ───────────────────────────────────────────────────
options nvidia-drm modeset=1
options nvidia-drm fbdev=1
