# models.yaml — Model registry for the AI OS daemon.
# Defines available local models and optional cloud inference backends.
# Users can add their own GGUF models by dropping files into
# /opt/ai-daemon/models/ and adding entries here (or via Settings UI).

models:
  default: "qwen3.5-4b-os-q4km"

  local:
    - name: "qwen3.5-4b-os-q4km"
      path: "/opt/ai-daemon/models/qwen3.5-4b-os-q4km.gguf"
      type: "gguf"
      description: "Default OS agent model (Qwen 3.5 4B, Q4_K_M quantization)"
    # Users add their own models here:
    # - name: "deepseek-7b"
    #   path: "/opt/ai-daemon/models/deepseek-7b-q4km.gguf"
    #   type: "gguf"
    #   description: "DeepSeek 7B for longer context tasks"

  # OpenRouter cloud inference (optional, user-configured).
  # API keys are stored in KWallet, not in this file.
  # The user's last-used model is remembered per-profile in KWallet.
  openrouter:
    enabled: false
